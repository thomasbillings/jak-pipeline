name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  top-level:
    name: top-level vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            mcp/mergify/package-lock.json

      - name: Install top-level dependencies
        run: npm ci

      - name: Install PyYAML (for doctor.sh Plan 2 YAML parse check)
        run: pip install pyyaml

      - name: Pre-build mcp/mergify (required by install.sh tests)
        # Avoids a race when multiple test files invoke install.sh in parallel
        # and each checks for dist/server.js — only the first wins the build.
        working-directory: mcp/mergify
        run: |
          npm ci
          npm run build

      - name: Run vitest
        run: npx vitest run

  mcp-server:
    name: mcp/mergify vitest + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp/mergify/package-lock.json

      - name: Install dependencies
        working-directory: mcp/mergify
        run: npm ci

      - name: Build (tsc)
        working-directory: mcp/mergify
        run: npm run build

      - name: Run vitest
        working-directory: mcp/mergify
        run: npx vitest run
