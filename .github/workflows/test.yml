name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege GITHUB_TOKEN — read-only access is all the test workflow
# needs. If a future job legitimately requires write access (eg. posting
# coverage comments on a PR), add a job-scoped `permissions:` block; do NOT
# loosen this top-level default.
permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# GitHub Actions are pinned to commit SHAs (not floating tags) to defend
# against supply-chain attacks via compromised tags. Dependabot
# (.github/dependabot.yml) opens PRs to bump these in tandem with the
# version comment.
jobs:
  top-level:
    name: top-level vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            mcp/mergify/package-lock.json

      - name: Install top-level dependencies
        run: npm ci

      - name: Install PyYAML (for doctor.sh Plan 2 YAML parse check)
        run: pip install pyyaml

      - name: Run vitest
        # Vitest's globalSetup (tests/_global-setup.ts) builds mcp/mergify/dist
        # once before tests start, eliminating the install-script parallel-build
        # race without needing a separate workflow step.
        run: npx vitest run

  mcp-server:
    name: mcp/mergify vitest + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp/mergify/package-lock.json

      - name: Install dependencies
        working-directory: mcp/mergify
        run: npm ci

      - name: Build (tsc)
        working-directory: mcp/mergify
        run: npm run build

      - name: Run vitest
        working-directory: mcp/mergify
        run: npx vitest run
