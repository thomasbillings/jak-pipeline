name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  top-level:
    name: top-level vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            mcp/mergify/package-lock.json

      - name: Install top-level dependencies
        run: npm ci

      - name: Install PyYAML (for doctor.sh Plan 2 YAML parse check)
        run: pip install pyyaml

      - name: Run vitest
        # Vitest's globalSetup (tests/_global-setup.ts) builds mcp/mergify/dist
        # once before tests start, eliminating the install-script parallel-build
        # race without needing a separate workflow step.
        run: npx vitest run

  mcp-server:
    name: mcp/mergify vitest + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp/mergify/package-lock.json

      - name: Install dependencies
        working-directory: mcp/mergify
        run: npm ci

      - name: Build (tsc)
        working-directory: mcp/mergify
        run: npm run build

      - name: Run vitest
        working-directory: mcp/mergify
        run: npx vitest run
